<!-- localStorage-backed shim so the app's storage calls work on a normal static page -->
<script>
if(!window.storage){
  window.storage = {
    async get(k){ try{ const v=localStorage.getItem(k); return v==null?null:{key:k,value:v}; }catch(e){ return null; } },
    async set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} return {key:k,value:v}; },
    async delete(k){ try{ localStorage.removeItem(k); }catch(e){} return {key:k,deleted:true}; },
    async list(p){ let keys=[]; try{ keys=Object.keys(localStorage).filter(x=>!p||x.startsWith(p)); }catch(e){} return {keys}; }
  };
}
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ============================================================
   WORLD CUP 2026 — FAMILY SWEEPSTAKE TRACKER  (v3)
   • Live sync via Anthropic web search (batched per group),
     with a web-search fallback
   • Trophy odds from real bookmaker prices, re-normalised live
   • True player-vs-player head-to-head
   • Golden Boot (scorers) + Golden Glove (clean sheets, derived)
   • Shared storage => one URL for the whole family
   ============================================================ */

const OWNERS = ["Mum","Harry","Vicki","Casey","Dan","Nan","Ruby","Dad","George","Harriette"];
const OWNER_COLOR = {
  Mum:"#F4C95D", Harry:"#5B8CFF", Vicki:"#3FD78B", Casey:"#FB6B5B", Dan:"#C792EA",
  Nan:"#FF9E64", Ruby:"#FF5C8A", Dad:"#4FD0E0", George:"#A3E635", Harriette:"#E8B04B",
};
const OWNER_OF = {
  "Japan":"Mum","Qatar":"Mum","Argentina":"Mum","United States":"Mum","Sweden":"Mum",
  "Senegal":"Harry","Egypt":"Harry","France":"Harry","Colombia":"Harry",
  "Ecuador":"Vicki","Switzerland":"Vicki","Saudi Arabia":"Vicki","Australia":"Vicki","Ghana":"Vicki",
  "Mexico":"Casey","Paraguay":"Casey","Ivory Coast":"Casey","Croatia":"Casey","New Zealand":"Casey",
  "Uzbekistan":"Dan","Turkey":"Dan","Panama":"Dan","Austria":"Dan","Uruguay":"Dan",
  "Haiti":"Nan","Norway":"Nan","Morocco":"Nan","Spain":"Nan","Belgium":"Nan",
  "DR Congo":"Ruby","Tunisia":"Ruby","Iraq":"Ruby","Algeria":"Ruby","Scotland":"Ruby",
  "Canada":"Dad","Portugal":"Dad","Czechia":"Dad","South Korea":"Dad","Jordan":"Dad",
  "Curaçao":"George","Bosnia":"George","Brazil":"George","Cape Verde":"George","Germany":"George",
  "Iran":"Harriette","Netherlands":"Harriette","England":"Harriette","South Africa":"Harriette",
};
const GROUPS = {
  A:["Mexico","South Korea","South Africa","Czechia"],
  B:["Canada","Switzerland","Qatar","Bosnia"],
  C:["Brazil","Morocco","Scotland","Haiti"],
  D:["United States","Australia","Paraguay","Turkey"],
  E:["Germany","Ecuador","Ivory Coast","Curaçao"],
  F:["Netherlands","Japan","Tunisia","Sweden"],
  G:["Belgium","Iran","Egypt","New Zealand"],
  H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],
  I:["France","Senegal","Norway","Iraq"],
  J:["Argentina","Austria","Algeria","Jordan"],
  K:["Portugal","Colombia","Uzbekistan","DR Congo"],
  L:["England","Croatia","Panama","Ghana"],
};
const GROUP_LETTERS = Object.keys(GROUPS);
const GROUP_OF = {}; GROUP_LETTERS.forEach(L=>GROUPS[L].forEach(t=>GROUP_OF[t]=L));
const ALL_TEAMS = Object.keys(OWNER_OF).sort();

// Real bookmaker decimal odds (mid-June 2026) -> strength.
const BASE_ODDS = {
  "Spain":6,"France":6,"England":7,"Argentina":9,"Portugal":10,"Brazil":13,"Germany":15,
  "Netherlands":21,"Norway":26,"Belgium":34,"Croatia":41,"Uruguay":41,"Morocco":41,"United States":41,
  "Colombia":51,"Mexico":51,"Senegal":51,"Switzerland":67,"Japan":67,"Sweden":67,
  "Ecuador":81,"Austria":81,"Turkey":81,"Canada":81,"Ivory Coast":101,"Egypt":126,
  "South Korea":151,"Australia":151,"Czechia":151,"Scotland":201,"Algeria":201,"Ghana":201,
  "Qatar":251,"Tunisia":251,"Iran":251,"Paraguay":251,"Bosnia":251,"DR Congo":251,
  "Saudi Arabia":501,"Uzbekistan":501,"South Africa":501,"Jordan":751,"Iraq":751,"Panama":751,
  "Cape Verde":751,"New Zealand":1001,"Haiti":1001,"Curaçao":1001,
};
const strength = t => 1/(BASE_ODDS[t] ?? 1500);

const KO_ORDER = ["Round of 32","Round of 16","Quarter-final","Semi-final","Third place","Final"];
const KO_CODE = { r32:"Round of 32", r16:"Round of 16", qf:"Quarter-final", sf:"Semi-final", "3p":"Third place", final:"Final" };

// name normaliser (handles ESPN + bookmaker variants)
const ALIAS = {
  "türkiye":"Turkey","turkiye":"Turkey","turkey":"Turkey","czech republic":"Czechia","czechia":"Czechia",
  "korea republic":"South Korea","south korea":"South Korea","republic of korea":"South Korea","korea, republic of":"South Korea",
  "usa":"United States","united states":"United States","united states of america":"United States",
  "côte d'ivoire":"Ivory Coast","cote d'ivoire":"Ivory Coast","ivory coast":"Ivory Coast",
  "curacao":"Curaçao","curaçao":"Curaçao","cabo verde":"Cape Verde","cape verde":"Cape Verde",
  "dr congo":"DR Congo","congo dr":"DR Congo","democratic republic of the congo":"DR Congo","congo democratic republic":"DR Congo",
  "bosnia":"Bosnia","bosnia and herzegovina":"Bosnia","bosnia & herzegovina":"Bosnia","bosnia-herzegovina":"Bosnia",
  "ir iran":"Iran","iran":"Iran","saudi arabia":"Saudi Arabia",
};
function normTeam(n){ if(!n) return null; const k=String(n).trim().toLowerCase();
  if(ALIAS[k]) return ALIAS[k]; const hit=ALL_TEAMS.find(t=>t.toLowerCase()===k); return hit||n; }

/* group fixtures */
function groupFixtures(L){ const t=GROUPS[L]; const pr=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]]; const md=[1,1,2,2,3,3];
  return pr.map((p,k)=>({id:`${L}-${p[0]}${p[1]}`,md:md[k],a:t[p[0]],b:t[p[1]]})); }
const FIXTURES={}; GROUP_LETTERS.forEach(L=>FIXTURES[L]=groupFixtures(L));
const FIXTURE_INDEX={}; GROUP_LETTERS.forEach(L=>FIXTURES[L].forEach(fx=>FIXTURE_INDEX[[fx.a,fx.b].sort().join("|")]={L,fx}));

function miniTable(names,results,L){
  const m={}; names.forEach(n=>m[n]={pts:0,gd:0,gf:0});
  FIXTURES[L].forEach(fx=>{ if(!m[fx.a]||!m[fx.b])return; const r=results[fx.id]; if(!r||r.hs==null)return;
    m[fx.a].gf+=r.hs; m[fx.a].gd+=r.hs-r.as; m[fx.b].gf+=r.as; m[fx.b].gd+=r.as-r.hs;
    if(r.hs>r.as)m[fx.a].pts+=3; else if(r.hs<r.as)m[fx.b].pts+=3; else {m[fx.a].pts++;m[fx.b].pts++;} });
  return m;
}
function computeStandings(L,results,discipline,official){
  const teams=GROUPS[L]; const idx=Object.fromEntries(teams.map((t,k)=>[t,k]));
  const disc=discipline||{};
  const st=teams.map(name=>({name,p:0,w:0,d:0,l:0,gf:0,ga:0}));
  FIXTURES[L].forEach(fx=>{const r=results[fx.id]; if(!r||r.hs==null||r.as==null)return;
    const A=st[idx[fx.a]],B=st[idx[fx.b]]; A.p++;B.p++;A.gf+=r.hs;A.ga+=r.as;B.gf+=r.as;B.ga+=r.hs;
    if(r.hs>r.as){A.w++;B.l++;}else if(r.hs<r.as){B.w++;A.l++;}else{A.d++;B.d++;}});
  st.forEach(x=>{x.pts=x.w*3+x.d;x.gd=x.gf-x.ga;x.fp=disc[x.name]||0;});

  // Prefer the official table (ESPN already applies FIFA's tiebreakers server-side) when every
  // team in this group is present in it; otherwise fall back to our own calc below.
  if(official && teams.every(t=>official[t])){
    st.forEach(x=>{ const o=official[x.name];
      x.rank=o.rank; x.pts=o.pts; x.p=o.p||x.p; x.w=o.w||x.w; x.d=o.d||x.d; x.l=o.l||x.l;
      x.gf=o.gf||x.gf; x.ga=o.ga||x.ga; x.gd=x.gf-x.ga; });
    st.sort((a,b)=>a.rank-b.rank);
    return st;
  }

  // FIFA World Cup 2026 tiebreaker order (Article 13 of the official regulations):
  // Step 1 (applied to teams level on points): head-to-head points, then head-to-head
  //         goal difference, then head-to-head goals scored — using ONLY the match(es)
  //         played between the tied teams themselves.
  // Step 2 (only for teams still level after Step 1): goal difference in ALL group
  //         matches, then goals scored in ALL group matches, then fair-play, then
  //         FIFA ranking (we use `strength` as a deterministic ranking proxy).
  st.sort((a,b)=>b.pts-a.pts);
  const out=[]; let i=0;
  while(i<st.length){
    let j=i+1; while(j<st.length && st[j].pts===st[i].pts) j++;
    let tied=st.slice(i,j);
    if(tied.length>1){
      const mini=miniTable(tied.map(t=>t.name),results,L);
      // Step 1: head-to-head among just the tied teams
      tied.sort((a,b)=>{ const ma=mini[a.name],mb=mini[b.name];
        return (mb.pts-ma.pts)||(mb.gd-ma.gd)||(mb.gf-ma.gf); });
      // Anyone STILL level after Step 1 (head-to-head didn't separate them) drops to Step 2
      const out2=[]; let k=0;
      while(k<tied.length){
        let m=k+1; const mk=mini[tied[k].name];
        while(m<tied.length){ const mm=mini[tied[m].name]; if(mm.pts===mk.pts&&mm.gd===mk.gd&&mm.gf===mk.gf) m++; else break; }
        let sub=tied.slice(k,m);
        if(sub.length>1){
          sub=[...sub].sort((a,b)=>(b.gd-a.gd)||(b.gf-a.gf)
            ||((disc[b.name]||0)-(disc[a.name]||0))          // fair play: fewer cards (less negative) ranks higher
            ||(strength(b.name)-strength(a.name))             // FIFA ranking — deterministic seeding proxy
            ||a.name.localeCompare(b.name));
        }
        out2.push(...sub); k=m;
      }
      tied=out2;
    }
    out.push(...tied); i=j;
  }
  out.forEach((x,k)=>x.rank=k+1); return out;
}
const groupDone=(L,r)=>FIXTURES[L].every(fx=>r[fx.id]&&r[fx.id].hs!=null);
function koWL(m){ if(m.hs==null||m.as==null)return null; if(m.hs>m.as)return{w:m.a,l:m.b}; if(m.hs<m.as)return{w:m.b,l:m.a};
  if(m.pa!=null&&m.pb!=null&&m.pa!==m.pb)return m.pa>m.pb?{w:m.a,l:m.b}:{w:m.b,l:m.a}; return null; }

// ---- Early mathematical elimination (group stage) ----------------------
// A team should drop out the moment it's IMPOSSIBLE for them to finish top
// 3 in their group, even while fixtures remain — not just once the group
// is fully played. We brute-force every remaining fixture's outcome (home
// win / draw / away win) and re-run the existing FIFA-tiebreaker-aware
// computeStandings() for each resulting scenario. A team is only "out"
// if EVERY scenario puts them at rank 4 — i.e. there's no possible run of
// results, under the real tiebreaker chain (pts, GD, goals, head-to-head,
// fair play, lots), that lets them survive.
const remainingFixtures=(L,results)=>FIXTURES[L].filter(fx=>!(results[fx.id]&&results[fx.id].hs!=null&&results[fx.id].as!=null));
function simulateGroupOutcomes(fixtures){
  if(!fixtures.length) return [{}];
  const outcomes=[{hs:2,as:0},{hs:0,as:0},{hs:0,as:2}];
  let combos=[{}];
  fixtures.forEach(fx=>{ const next=[]; combos.forEach(c=>outcomes.forEach(o=>next.push({...c,[fx.id]:o}))); combos=next; });
  return combos;
}
// Returns the set of teams in group L that are guaranteed to finish 4th
// no matter how the remaining fixtures go.
function computeEarlyEliminations(L,results,discipline,official){
  const remaining=remainingFixtures(L,results);
  const scenarios=simulateGroupOutcomes(remaining);
  const survives=new Set();
  scenarios.forEach(scenario=>{
    const simResults={...results,...scenario};
    // Real ESPN official standings only reflect the actual current state —
    // once we're simulating hypothetical future results, fall back to our
    // own tiebreaker calc; only use official for the (single) scenario that
    // matches the truly current, already-played results.
    const useOfficial = remaining.length===0 ? official : null;
    const st=computeStandings(L,simResults,discipline,useOfficial);
    st.forEach(s=>{ if(s.rank<=3) survives.add(s.name); });
  });
  const out=new Set();
  GROUPS[L].forEach(t=>{ if(!survives.has(t)) out.add(t); });
  return out;
}

/* storage */
const STATE_KEY="wc26x:state:v1", CONFIG_KEY="wc26x:config:v1";
const SEED_RESULTS={ "A-02":{hs:2,as:0,src:"auto"},"A-13":{hs:2,as:1,src:"auto"},
  "B-03":{hs:1,as:1,src:"auto"},"B-12":{hs:1,as:1,src:"auto"},"E-03":{hs:7,as:1,src:"auto"},"F-01":{hs:2,as:2,src:"auto"} };
const DEFAULT_STATE={ groupResults:SEED_RESULTS, ko:[], awards:{champion:null, goldenBoot:null},
  scorers:[], keepers:[], autoScorers:[], autoKeepers:[], discipline:{}, officialStandings:null,
  upcoming:[], live:[], resultDates:{}, odds:{}, lastSync:null, syncError:null };
const hasStore = typeof window!=="undefined" && window.storage;

/* ============================================================ */
function App(){
  const [state,setState]=useState(DEFAULT_STATE);
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState("leaderboard");
  const [syncing,setSyncing]=useState(false);
  const syncingRef=useRef(false);
  const stateRef=useRef(state);
  stateRef.current=state;

  useEffect(()=>{(async()=>{
    if(hasStore){
      try{const r=await window.storage.get(STATE_KEY,true); if(r?.value) setState({...DEFAULT_STATE,...JSON.parse(r.value)});}catch(e){}
    }
    setLoaded(true);
  })();},[]);

  const persistNow=useCallback(async(next)=>{ setState(next); if(hasStore){try{await window.storage.set(STATE_KEY,JSON.stringify(next),true);}catch(e){}} },[]);

  const doSync=useCallback(async()=>{
    setSyncing(true); syncingRef.current=true;
    try{
      const payload=await fetchLive();
      let base=stateRef.current;
      if(hasStore){try{const r=await window.storage.get(STATE_KEY,true); if(r?.value) base={...DEFAULT_STATE,...JSON.parse(r.value)};}catch(e){}}
      await persistNow(mergeLive(base,payload));
    }catch(e){ setState({...stateRef.current,syncError:String(e.message||e)}); }
    finally{ setSyncing(false); syncingRef.current=false; }
  },[persistNow]);

  // One fresh pull when the page opens; after that, only the "Sync now" button refreshes —
  // EXCEPT while a match is actually live, where we poll quietly every 60s so the Golden
  // Boot (and live scores) stay current without re-fetching constantly when nothing's on.
  const didSync=useRef(false);
  useEffect(()=>{ if(!loaded||didSync.current) return; didSync.current=true; doSync(); },[loaded,doSync]);

  const isLive = (state.live||[]).length>0;
  useEffect(()=>{
    if(!isLive) return; // efficiency: no background timer at all when nothing's live
    const id=setInterval(()=>{ if(!syncingRef.current) doSync(); }, 60000);
    return ()=>clearInterval(id);
  },[isLive,doSync]);

  const A=useMemo(()=>analyse(state),[state]);
  if(!loaded) return <Shell><Style/><div style={{padding:"90px 20px",textAlign:"center",color:C.muted}}>Loading the sweepstake…</div></Shell>;

  const standing=OWNERS.filter(o=>!A.owner[o].out).length;
  const teamsLeft=ALL_TEAMS.filter(t=>!A.teamOut[t]).length;
  const leader=A.ownerRanked[0];
  const TABS=[["leaderboard","Odds"],["h2h","H2H"],["groups","Groups"],["knockouts","KO"],["awards","Awards"]];

  return (
    <Shell>
      <Style/>
      <div style={{padding:"22px 18px 6px"}}>
        <div>
          <div style={{font:"800 11px/1 Inter",letterSpacing:"3px",color:C.gold,textTransform:"uppercase",marginBottom:8}}>Canada · México · USA 2026</div>
          <h1 className="display" style={{margin:0,fontSize:30,lineHeight:1,letterSpacing:"-.5px",color:C.text,whiteSpace:"nowrap"}}>World Cup Sweepstake</h1>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:18}}>
          <Stat big={standing} unit={`of ${OWNERS.length}`} label="players still standing"/>
          <Stat big={teamsLeft} unit="teams" label="still in the cup"/>
          <div className="card statcard" style={{flex:"1 1 150px"}}>
            <div style={{font:"700 10px/1 Inter",letterSpacing:"1.5px",color:C.muted,textTransform:"uppercase"}}>Out in front</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}><Crest owner={leader.owner} size={26}/><span className="display" style={{fontSize:22,color:C.text}}>{leader.owner}</span><span style={{marginLeft:"auto",fontSize:15}}>👑</span></div>
          </div>
        </div>
        <LiveAndNextStrip A={A}/>
        <SyncBar state={state} syncing={syncing} onSync={doSync}/>
      </div>

      <div className="tabs">{TABS.map(([k,l])=><button key={k} className={"tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{l}</button>)}</div>

      <div style={{padding:"4px 14px 60px"}}>
        {tab==="leaderboard" && <Leaderboard A={A}/>}
        {tab==="h2h" && <HeadToHead A={A}/>}
        {tab==="groups" && <GroupsView A={A}/>}
        {tab==="knockouts" && <KnockoutsView state={state} A={A}/>}
        {tab==="awards" && <AwardsView A={A}/>}
      </div>

      <footer style={{padding:"18px 18px 32px",borderTop:`1px solid ${C.line}`,color:C.muted,font:"500 12px/1.6 Inter"}}>
        Share this URL with the family — everyone sees the same live results.
        <div style={{marginTop:6,opacity:.7}}>Results sync automatically; trophy odds start from bookmaker prices, adjust for live form, and re-normalise across surviving teams. The latest results load each time you open the page — tap “Sync now” to refresh.</div>
      </footer>
    </Shell>
  );
}

/* ============================================================
   LIVE SYNC  (Anthropic web search, batched for reliability)
   ============================================================ */
const TODAY_STR = new Date().toDateString();
async function aiSearchJSON(prompt){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}],tools:[{type:"web_search_20250305",name:"web_search"}]})});
  if(!res.ok) throw new Error("HTTP "+res.status);
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  const s=text.indexOf("["), e=text.lastIndexOf("]");
  if(s<0||e<0) return [];
  try{ const arr=JSON.parse(text.slice(s,e+1)); return Array.isArray(arr)?arr:[]; }catch(_){ return []; }
}
function groupPrompt(letters){
  const lines=letters.map(L=>`Group ${L} (${GROUPS[L].join(", ")})`).join(" and ");
  return `Use web search to find FINISHED match results so far at the 2026 FIFA World Cup for ${lines}. Today is ${TODAY_STR}. Return ONLY a JSON array, no prose or markdown: [{"a":"Team","b":"Team","ga":0,"gb":0}]. Include only matches already completed (full time). Use exactly these team names. If none have finished, return [].`;
}
const KO_PROMPT=`Use web search to find FINISHED knockout-stage results at the 2026 FIFA World Cup (Round of 32 onward). Today is ${TODAY_STR}. Return ONLY a JSON array, no prose: [{"round":"Round of 32|Round of 16|Quarter-final|Semi-final|Third place|Final","a":"Team","b":"Team","ga":0,"gb":0,"pa":null,"pb":null}]. Only completed matches; pa/pb are penalty-shootout scores or null. Use exact country names. If none yet, return [].`;
const SCORERS_PROMPT=`Use web search to find the current TOP GOALSCORERS at the 2026 FIFA World Cup. Today is ${TODAY_STR}. Return ONLY a JSON array, top 10 highest first, no prose: [{"p":"Player full name","t":"Team","g":0}]. Use exact country names. If unclear this early, return [].`;

async function fetchSearch(){
  const groupBatches=[["A","B","C"],["D","E","F"],["G","H","I"],["J","K","L"]];
  const jobs=[ ...groupBatches.map(g=>({type:"group",prompt:groupPrompt(g)})),
    {type:"ko",prompt:KO_PROMPT}, {type:"sc",prompt:SCORERS_PROMPT} ];
  const settled=await Promise.allSettled(jobs.map(j=>aiSearchJSON(j.prompt)));
  if(!settled.some(s=>s.status==="fulfilled")) throw new Error("search unavailable");
  const results=[], scorers=[];
  settled.forEach((s,i)=>{
    if(s.status!=="fulfilled") return; const arr=Array.isArray(s.value)?s.value:[]; const type=jobs[i].type;
    if(type==="group") arr.forEach(m=>{ const a=normTeam(m.a),b=normTeam(m.b);
      if(OWNER_OF[a]&&OWNER_OF[b]&&FIXTURE_INDEX[[a,b].sort().join("|")]&&m.ga!=null&&m.gb!=null&&Number.isFinite(+m.ga)&&Number.isFinite(+m.gb))
        results.push({stage:"group",a,b,ga:+m.ga,gb:+m.gb,pa:null,pb:null}); });
    else if(type==="ko") arr.forEach(m=>{ const a=normTeam(m.a),b=normTeam(m.b); const round=KO_ORDER.includes(m.round)?m.round:null;
      if(round&&OWNER_OF[a]&&OWNER_OF[b]&&m.ga!=null&&m.gb!=null&&Number.isFinite(+m.ga)&&Number.isFinite(+m.gb))
        results.push({stage:round,a,b,ga:+m.ga,gb:+m.gb,pa:m.pa==null?null:+m.pa,pb:m.pb==null?null:+m.pb}); });
    else arr.forEach(x=>{ const t=normTeam(x.t); if(OWNER_OF[t]&&x.p&&x.g!=null&&Number.isFinite(+x.g)) scorers.push({p:String(x.p),t,g:+x.g}); });
  });
  return { results, scorers: scorers.sort((a,b)=>b.g-a.g).slice(0,15) };
}

/* ---- ESPN public feed: complete, every group, every match (works on a normal web page / GitHub Pages) ---- */
const ESPN_URL="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";
const ESPN_SUMMARY_URL="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary";
function allTournamentDates(){ const out=[],start=Date.UTC(2026,5,11),end=Date.UTC(2026,6,19);
  for(let t=start;t<=end;t+=86400000){const d=new Date(t);out.push(`${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,"0")}${String(d.getUTCDate()).padStart(2,"0")}`);} return out; }
function numOrNull(v){const n=parseInt(v,10);return Number.isFinite(n)?n:null;}
function resolveTeam(team){ if(!team) return null;
  for(const f of [team.displayName,team.shortDisplayName,team.name,team.location,team.abbreviation]){ const r=normTeam(f); if(r&&OWNER_OF[r]) return r; }
  const c=String(team.displayName||team.name||"").toLowerCase();
  return ALL_TEAMS.find(t=>{const tl=t.toLowerCase();return c&&(c.includes(tl)||tl.includes(c));})||null; }
function espnStage(ev,comp,a,b){ if(FIXTURE_INDEX[[a,b].sort().join("|")]) return "group";
  const txt=((comp?.notes?.[0]?.headline)||ev.name||ev.shortName||"").toLowerCase();
  if(/round of 32|r32/.test(txt))return"Round of 32"; if(/round of 16|r16/.test(txt))return"Round of 16";
  if(/quarter/.test(txt))return"Quarter-final"; if(/semi/.test(txt))return"Semi-final"; if(/third|3rd|play-?off/.test(txt))return"Third place"; if(/final/.test(txt))return"Final";
  const d=new Date(ev.date),md=(d.getUTCMonth()+1)*100+d.getUTCDate();
  if(md>=628&&md<=703)return"Round of 32"; if(md>=704&&md<=708)return"Round of 16"; if(md>=709&&md<=712)return"Quarter-final"; if(md>=713&&md<=716)return"Semi-final"; if(md===718)return"Third place"; if(md>=717)return"Final"; return"Round of 32"; }
async function fetchESPN(){
  const settled=await Promise.allSettled(allTournamentDates().map(d=>
    fetch(`${ESPN_URL}?dates=${d}&limit=100`).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })));
  const ok=settled.filter(s=>s.status==="fulfilled");
  if(!ok.length) throw new Error("ESPN unreachable");
  const events=[], seen=new Set();
  ok.forEach(s=>(s.value.events||[]).forEach(ev=>{ if(ev.id&&!seen.has(ev.id)){ seen.add(ev.id); events.push(ev); } }));
  if(!events.length) throw new Error("ESPN returned nothing");
  const results=[], scorerMap={}, disc={}, upcoming=[], live=[], completedForStats=[];
  const now=Date.now();
  events.forEach(ev=>{ const comp=ev.competitions?.[0]; if(!comp) return;
    const cs=comp.competitors||[]; const home=cs.find(c=>c.homeAway==="home")||cs[0]; const away=cs.find(c=>c.homeAway==="away")||cs[1]; if(!home||!away) return;
    const a=resolveTeam(home.team), b=resolveTeam(away.team); if(!a||!b) return;
    const stType=comp.status?.type?.state; // "pre" | "in" | "post"
    const completed=comp.status?.type?.completed ?? (stType==="post");
    const evDate=ev.date||null; // ISO string e.g. "2026-06-12T19:00Z"
    if(stType==="in"){
      if(OWNER_OF[a]&&OWNER_OF[b]){
        const ga=parseInt(home.score,10), gb=parseInt(away.score,10);
        live.push({stage:espnStage(ev,comp,a,b),a,b,
          ga:Number.isFinite(ga)?ga:0, gb:Number.isFinite(gb)?gb:0,
          clock:comp.status?.displayClock||null, period:comp.status?.period||null,
          detail:comp.status?.type?.shortDetail||comp.status?.type?.detail||null});
        // Capture goals as they happen in live matches too, so Golden Boot updates mid-game.
        (comp.details||[]).forEach(d=>{ const tx=(d?.type?.text||"").toLowerCase();
          if(d.scoringPlay && !/own goal/.test(tx)){ const nm=d.athletesInvolved?.[0]?.displayName; if(nm){
            const tm=d.team?.id===home.team?.id?a:b; const k=nm+"|"+tm;
            (scorerMap[k]=scorerMap[k]||{p:nm,t:tm,g:0}).g++;
          } }
        });
      }
      return;
    }
    if(!completed){
      // upcoming: only future matches involving sweepstake teams
      const koISO=evDate; const koMs=koISO?Date.parse(koISO):null;
      if(OWNER_OF[a]&&OWNER_OF[b]) upcoming.push({stage:espnStage(ev,comp,a,b),a,b,ko:koISO,koMs:koMs||0});
      return;
    }
    const ga=parseInt(home.score,10), gb=parseInt(away.score,10); if(!Number.isFinite(ga)||!Number.isFinite(gb)) return;
    const stage=espnStage(ev,comp,a,b);
    results.push({stage,a,b,ga,gb,pa:numOrNull(home.shootoutScore),pb:numOrNull(away.shootoutScore),date:evDate});
    if(OWNER_OF[a]||OWNER_OF[b]) completedForStats.push({id:ev.id,a,b,homeTeamId:home.team?.id,awayTeamId:away.team?.id});
    (comp.details||[]).forEach(d=>{ const tx=(d?.type?.text||"").toLowerCase();
      const tm=d.team?.id===home.team?.id?a:b;
      if(d.scoringPlay && !/own goal/.test(tx)){ const nm=d.athletesInvolved?.[0]?.displayName; if(nm){ const k=nm+"|"+tm; (scorerMap[k]=scorerMap[k]||{p:nm,t:tm,g:0}).g++; } }
      if(stage==="group"){
        if(/yellow.?red|second yellow/.test(tx)) disc[tm]=(disc[tm]||0)-2;
        else if(/red card/.test(tx)) disc[tm]=(disc[tm]||0)-4;
        else if(/yellow/.test(tx)) disc[tm]=(disc[tm]||0)-1;
      }
    });
  });
  upcoming.sort((a,b)=>a.koMs-b.koMs);
  let autoKeepers=[];
  try{
    const {scorerExtra,gkExtra}=await fetchPlayerStats(completedForStats);
    Object.entries(scorerExtra).forEach(([key,v])=>{
      if(scorerMap[key]){ scorerMap[key].a=(scorerMap[key].a||0)+v.a; scorerMap[key].min=(scorerMap[key].min||0)+v.min;
        scorerMap[key].matches=(scorerMap[key].matches||[]).concat(v.matches||[]); }
    });
    autoKeepers=Object.entries(gkExtra).map(([key,v])=>{
      const [p,t]=key.split("|");
      return {p,t,cs:v.cs,saves:v.saves,min:v.min,matches:v.matches||[]};
    }).filter(k=>OWNER_OF[k.t])
      .sort((a,b)=>b.cs-a.cs || b.saves-a.saves || a.min-b.min).slice(0,20);
  }catch(e){ /* non-fatal: Golden Boot still shows goals-only ranking, Golden Glove stays empty if this fails */ }
  const scorers=Object.values(scorerMap).filter(s=>OWNER_OF[s.t])
    .sort((x,y)=>y.g-x.g || (y.a||0)-(x.a||0) || (x.min??9999)-(y.min??9999)).slice(0,15);
  return { results, scorers, autoKeepers, discipline: disc, upcoming: upcoming.slice(0,40), live };
}

/* ---- Golden Boot enrichment: assists + minutes played, per FIFA tiebreaker order
   (goals -> assists -> fewest minutes). Goals already come reliably from the
   scoreboard's `comp.details` scoring-play events above. Assists and minutes are
   NOT exposed there — ESPN's soccer boxscore only carries them per-match via the
   `summary?event=` endpoint, so this fetches that endpoint once per completed
   match and folds the totals into the existing scorerMap by the same "name|team"
   key already used for goals. Defensive throughout: if ESPN's real field names
   differ from the documented shape, a match's enrichment is silently skipped
   (goals still display correctly) rather than breaking the whole sync. ---- */
function parseMatchLength(displayClock){
  if(!displayClock) return 90;
  const m=/^(\d+)'(?:\+(\d+)')?/.exec(displayClock);
  if(!m) return 90;
  return (parseInt(m[1],10)||90)+(parseInt(m[2],10)||0);
}
function parseMinuteMark(clockText){
  if(!clockText) return null;
  const m=/^(\d+)'(?:\+(\d+)')?/.exec(clockText);
  if(!m) return null;
  return (parseInt(m[1],10)||0)+(parseInt(m[2],10)||0);
}
async function fetchPlayerStats(completedForStats){
  if(!completedForStats.length) return {scorerExtra:{}, gkExtra:{}};
  const settled=await Promise.allSettled(completedForStats.map(ev=>
    fetch(`${ESPN_SUMMARY_URL}?event=${ev.id}`).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }).then(json=>({ev,json}))));
  const scorerExtra={}, gkExtra={};

  // Cross-reference goalkeepers across ALL matches processed this sync. Confirmed via real
  // data: ESPN tags a substitute's `position` field as the generic "Substitute"/"SUB" role,
  // not their actual playing position -- so a keeper who comes on as a sub (e.g. replacing
  // an injured starter) was silently misclassified as an outfielder and his minutes dropped
  // from the Golden Glove entirely. Fix: trust the explicit "Goalkeeper" tag wherever it
  // appears (almost always true for the match where they started/are properly listed) and
  // carry that identity over to every other match regardless of how that match tags them.
  const GK_IDS=new Set();
  settled.forEach(s=>{
    if(s.status!=="fulfilled") return;
    const rosters=s.value.json?.rosters||s.value.json?.boxscore?.players||[];
    rosters.forEach(teamRoster=>{
      const entries=teamRoster.roster||teamRoster.statistics?.[0]?.athletes||[];
      entries.forEach(entry=>{
        const id=entry.athlete?.id||entry.id;
        if(id && /goalkeeper|^gk$|^g$/i.test(entry.position?.name||entry.position?.abbreviation||"")) GK_IDS.add(id);
      });
    });
  });
  // Goalkeeper substitutions are (effectively) always like-for-like -- if a sub replaced a
  // known goalkeeper, the substitute is one too, even on their very first tournament
  // appearance (when no match yet shows them with an explicit goalkeeper tag at all).
  settled.forEach(s=>{
    if(s.status!=="fulfilled") return;
    const rosters=s.value.json?.rosters||s.value.json?.boxscore?.players||[];
    rosters.forEach(teamRoster=>{
      const entries=teamRoster.roster||teamRoster.statistics?.[0]?.athletes||[];
      entries.forEach(entry=>{
        const id=entry.athlete?.id||entry.id;
        const replacedId=entry.subbedInFor?.athlete?.id;
        if(id && replacedId && GK_IDS.has(replacedId)) GK_IDS.add(id);
      });
    });
  });
  settled.forEach(s=>{
    if(s.status!=="fulfilled") return;
    try{
      const {ev,json}=s.value;
      const comp=json?.header?.competitions?.[0];
      const rosters=json?.rosters||json?.boxscore?.players||[];

      const flatEntries=[];
      rosters.forEach(teamRoster=>{
        const teamId=teamRoster.team?.id;
        const teamName=teamId===ev.homeTeamId?ev.a:(teamId===ev.awayTeamId?ev.b:null);
        if(!teamName) return;
        const entries=teamRoster.roster||teamRoster.statistics?.[0]?.athletes||[];
        entries.forEach(entry=>flatEntries.push({entry,teamName}));
      });

      // ESPN's match clock follows standard broadcast convention: second-half timestamps
      // (e.g. "80'", "90'+8'") do NOT include first-half stoppage -- "Start 2nd Half" is
      // labelled "45'", not "49'", even when 4 minutes were added in the 1st half (confirmed
      // real data). So any clearly-second-half timestamp (base minute >45) needs the 1st-half
      // stoppage added back to get true elapsed on-pitch minutes; 1st-half timestamps (base <45)
      // are already literal elapsed time and need no adjustment.
      const keyEvents=json?.keyEvents||[];
      const halftimeEvt=keyEvents.find(e=>e?.type?.type==="halftime");
      const halfOneAdded=halftimeEvt?Math.max(0,(parseMinuteMark(halftimeEvt.clock?.displayValue)||45)-45):0;
      const realMinute=(displayValue)=>{
        const m=/^(\d+)'(?:\+(\d+)')?/.exec(displayValue||"");
        if(!m) return null;
        const raw=(parseInt(m[1],10)||0)+(parseInt(m[2],10)||0);
        return (parseInt(m[1],10)||0)>45 ? raw+halfOneAdded : raw;
      };

      const endRegEvt=keyEvents.find(e=>e?.type?.type==="end-regular-time");
      let matchLen=endRegEvt?realMinute(endRegEvt.clock?.displayValue):null;
      // 2nd-half stoppage: the "+X" part of the full-time clock (e.g. "90+5'" -> 5 mins),
      // read straight off the same end-of-regulation event used for matchLen above.
      const endDisp=endRegEvt?.clock?.displayValue||"";
      const endM=/^(\d+)'(?:\+(\d+)')?/.exec(endDisp);
      const halfTwoAdded=(endM && (parseInt(endM[1],10)||0)>45) ? (parseInt(endM[2],10)||0) : 0;
      if(matchLen==null){
        // Fallback for matches missing this marker (e.g. unexpected feed gaps): old proxy.
        let maxPlayMinute=0;
        flatEntries.forEach(({entry})=>(entry.plays||[]).forEach(p=>{
          const m=parseMinuteMark(p.clock?.displayValue); if(m!=null&&m>maxPlayMinute) maxPlayMinute=m;
        }));
        matchLen=Math.max(parseMatchLength(comp?.status?.displayClock), maxPlayMinute);
      }

      // Splits any [start,end] real-minute window into "regular time" vs "stoppage time"
      // played, where stoppage = the 1st-half stoppage window (45 -> 45+halfOneAdded) plus
      // the 2nd-half stoppage window (90+halfOneAdded -> matchLen). Used purely for the
      // audit display below; the raw end-start minute count is unaffected either way.
      const splitRegularStoppage=(start,end)=>{
        const overlap=(aS,aE,bS,bE)=>Math.max(0,Math.min(aE,bE)-Math.max(aS,bS));
        const h1Stop=overlap(start,end,45,45+halfOneAdded);
        const h2Stop=overlap(start,end,90+halfOneAdded,matchLen);
        const stoppage=h1Stop+h2Stop;
        return { regular: Math.max(0,(end-start)-stoppage), stoppage };
      };

      // Minutes-played calculation -- identical logic for every player regardless of
      // position (starters run 0 -> sub-off/full-time, subs run sub-on -> full-time,
      // red cards cap the end), since plays[]/starter/subbedOut/subbedIn behave the
      // same way for goalkeepers as outfielders.
      // Returns {min, detail} -- detail is a plain-English audit trail of exactly how `min`
      // was derived for this player in this match, so totals shown in the app can always be
      // traced back to specific clock events instead of taken on trust.
      const minutesFor=(entry)=>{
        if(!entry.starter && !entry.subbedIn) return {min:0, detail:{role:"Did not play",start:0,end:0,matchLen,regular:0,stoppage:0,note:"Not a starter and never subbed on"}};
        const plays=entry.plays||[];
        const subReal=plays.filter(p=>p.substitution).map(p=>realMinute(p.clock?.displayValue)).filter(v=>v!=null).sort((a,b)=>a-b);
        const redCardPlay=plays.find(p=>p.redCard);
        const redReal=redCardPlay?realMinute(redCardPlay.clock?.displayValue):null;
        let start=0, end=matchLen, role, subEvent=null;
        if(entry.starter){
          role="Started";
          if(entry.subbedOut){ end=subReal[0]??matchLen; subEvent=subReal[0]??null; }
        } else {
          role="Substitute";
          start=subReal[0]??0;
          if(entry.subbedOut && subReal.length>1){ end=subReal[1]; subEvent=subReal[1]; }
        }
        const redCardApplied = redReal!=null && redReal<end;
        if(redReal!=null) end=Math.min(end,redReal);
        end=Math.max(start,end);
        const {regular,stoppage}=splitRegularStoppage(start,end);
        return {min:Math.max(0,end-start), detail:{role,start,end,matchLen,regular,stoppage,subEvent,redCard:redCardApplied?redReal:null,halfOneAdded,halfTwoAdded}};
      };

      flatEntries.forEach(({entry,teamName})=>{
        const athleteId=entry.athlete?.id||entry.id;
        const name=entry.athlete?.displayName||entry.displayName;
        if(!athleteId||!name) return;
        const stats=entry.stats||entry.statistics||[];
        const findStat=(...keys)=>stats.find(st=>{ const n=(st.name||st.abbreviation||"").toLowerCase(); return keys.includes(n); });
        const statVal=(st)=>st?(parseInt(st.displayValue??st.value,10)||0):0;

        const isGK=GK_IDS.has(athleteId) || /goalkeeper|^gk$|^g$/i.test(entry.position?.name||entry.position?.abbreviation||"");
        const {min:minutes, detail:minDetail}=minutesFor(entry);
        const opponent = teamName===ev.a ? ev.b : ev.a;
        const matchLogEntry = { opponent, eventId: ev.id, ...minDetail, min: minutes };

        if(isGK){
          const conceded=statVal(findStat("goalsconceded","ga"));
          const directSaves=findStat("saves","sv");
          let saves;
          if(directSaves){
            saves=statVal(directSaves);
          } else {
            const shotsFaced=statVal(findStat("shotsfaced","shf","shotsongoal","soga"));
            saves=Math.max(0,shotsFaced-conceded);
          }
          // Clean sheet requires playing the WHOLE match (kick-off to full time, including
          // extra time in knockouts) without conceding -- a keeper subbed off, or a sub who
          // came on, doesn't qualify even if their team didn't concede while they were on.
          const playedFullMatch = minDetail.start===0 && minDetail.end>=(minDetail.matchLen||0) && minDetail.matchLen>0;
          const cleanSheet=playedFullMatch && conceded===0 ? 1 : 0;
          const key=name+"|"+teamName;
          const cur=gkExtra[key]||{cs:0,saves:0,min:0,matches:[]};
          cur.cs+=cleanSheet; cur.saves+=saves; cur.min+=minutes; cur.matches.push(matchLogEntry); gkExtra[key]=cur;
        } else {
          const assistStat=findStat("goalassists","assists","a");
          const assists=statVal(assistStat);
          const key=name+"|"+teamName;
          const cur=scorerExtra[key]||{a:0,min:0,matches:[]};
          cur.a+=assists; cur.min+=minutes; cur.matches.push(matchLogEntry); scorerExtra[key]=cur;
        }
      });
    }catch(e){ /* skip this match's enrichment only — goals still synced fine */ }
  });
  return {scorerExtra, gkExtra};
}

/* ---- ESPN's own official standings table — already FIFA-tiebreaker-correct server-side, so we mirror it
   rather than re-deriving rank ourselves. Falls back gracefully if unavailable. ---- */
function statVal(entry,...names){
  const stats=entry?.stats||[];
  for(const want of names){
    const hit=stats.find(s=>{ const n=(s.name||s.abbreviation||s.shortDisplayName||"").toLowerCase(); return n===want.toLowerCase(); });
    if(hit){ const v=hit.value!=null?hit.value:parseFloat(hit.displayValue); if(Number.isFinite(v)) return v; }
  }
  return null;
}
async function fetchESPNStandings(){
  const urls=[
    "https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings",
    "https://site.web.api.espn.com/apis/v2/sports/soccer/fifa.world/standings",
  ];
  let data=null, lastErr=null;
  for(const u of urls){ try{ const r=await fetch(u); if(!r.ok) throw new Error("HTTP "+r.status); data=await r.json(); if(data) break; }catch(e){ lastErr=e; } }
  if(!data) throw new Error("standings unreachable — "+(lastErr?lastErr.message:"no response"));
  // groups live under data.children (one per World Cup group); each has standings.entries
  const groups=data.children||data.standings?.[0]?.children||[];
  if(!groups.length) throw new Error("standings: no groups in response");
  const table={}; // teamName -> {rank,pts,p,w,d,l,gf,ga,gd}
  groups.forEach(g=>{
    const entries=g.standings?.entries||[]; const ranked=[];
    entries.forEach(e=>{ const name=resolveTeam(e.team); if(!name) return;
      const pts=statVal(e,"points","pts"), p=statVal(e,"gamesplayed","played","gp"),
        w=statVal(e,"wins","w"), d=statVal(e,"ties","draws","d"), l=statVal(e,"losses","l"),
        gf=statVal(e,"pointsfor","goalsfor","gf"), ga=statVal(e,"pointsagainst","goalsagainst","ga"),
        rank=(e.note&&Number.isFinite(e.note.rank)?e.note.rank:null) ?? statVal(e,"rank") ?? null;
      ranked.push({name, pts:pts??0, p:p??0, w:w??0, d:d??0, l:l??0, gf:gf??0, ga:ga??0, rank});
    });
    // if ESPN doesn't expose an explicit rank stat, entries are already returned in their official order
    ranked.forEach((r,i)=>{ table[r.name]={ ...r, rank:r.rank??(i+1) }; });
  });
  if(!Object.keys(table).length) throw new Error("standings: no teams parsed");
  return table;
}
async function fetchLive(){
  let core;
  try{ core = await fetchESPN(); }                  // primary: complete + accurate on a normal page
  catch(eE){ try{ core = await fetchSearch(); }     // fallback: web search (used inside the Claude sandbox)
    catch(eS){ throw new Error(`sync failed — ${eE.message}`); } }
  let officialStandings=null;
  try{ officialStandings = await fetchESPNStandings(); }catch(e){ /* non-fatal: Groups tab falls back to our own table */ }
  return { ...core, officialStandings };
}

function mergeLive(prev,p){
  const next={...prev}; const gr={...prev.groupResults}; const ko=[...prev.ko];
  (p.results||[]).forEach(m=>{
    if(m.stage==="group"){
      const hit=FIXTURE_INDEX[[m.a,m.b].sort().join("|")]; if(!hit) return;
      const cur=gr[hit.fx.id]; if(cur&&cur.src==="manual") return;
      const fwd=hit.fx.a===m.a; gr[hit.fx.id]={hs:fwd?m.ga:m.gb,as:fwd?m.gb:m.ga,src:"auto"};
    } else {
      const round=m.stage; const key=[m.a,m.b].sort().join("|");
      const i=ko.findIndex(x=>x.round===round && [x.a,x.b].sort().join("|")===key);
      if(i>=0 && ko[i].src==="manual") return;
      const A=i<0?m.a:ko[i].a; const fwd=A===m.a;
      const rec={id:i<0?`ko-${round}-${key}`:ko[i].id,round,a:A,b:i<0?m.b:ko[i].b,
        hs:fwd?m.ga:m.gb,as:fwd?m.gb:m.ga,pa:m.pa==null?null:(fwd?m.pa:m.pb),pb:m.pb==null?null:(fwd?m.pb:m.pa),src:"auto"};
      if(i<0) ko.push(rec); else ko[i]=rec;
    }
  });
  next.groupResults=gr; next.ko=ko;
  next.autoScorers=(p.scorers||[]).filter(s=>OWNER_OF[s.t]).slice(0,20);
  next.autoKeepers=(p.autoKeepers||[]).filter(k=>OWNER_OF[k.t]).slice(0,20);
  next.discipline=p.discipline||{};
  if(p.officialStandings) next.officialStandings=p.officialStandings;
  if(p.upcoming) next.upcoming=p.upcoming;
  next.live=p.live||[]; // always fresh — live state is transient, never "locked"
  // Store result dates: merge into a date map {fixtureKey -> ISO}
  const rdates={...prev.resultDates||{}};
  (p.results||[]).forEach(m=>{ if(m.date&&m.a&&m.b) rdates[[m.a,m.b].sort().join("|")]=m.date; });
  next.resultDates=rdates;
  next.lastSync=new Date().toISOString(); next.syncError=null;
  return next;
}

/* ============================================================ ANALYSIS ============================================================ */
// Given a ranked list (already sorted desc by value) and accessors for value + owning player,
// returns the unique players who share the single top value — i.e. a genuine tie at #1.
function tiedWinners(list, valueOf, ownerOf){
  if(!list.length) return [];
  const top=valueOf(list[0]);
  const owners=new Set();
  list.forEach(item=>{ if(valueOf(item)===top){ const o=ownerOf(item); if(o) owners.add(o); } });
  return [...owners];
}

function analyse(state){
  const results=state.groupResults||{}, ko=state.ko||[], odds=state.odds||{}, discipline=state.discipline||{}, official=state.officialStandings||null;
  const rdates=state.resultDates||{}, upcoming=state.upcoming||[], live=(state.live||[]).filter(m=>OWNER_OF[m.a]&&OWNER_OF[m.b]);
  const standings={},complete={},rankOf={};
  GROUP_LETTERS.forEach(L=>{ standings[L]=computeStandings(L,results,discipline,official); complete[L]=groupDone(L,results); standings[L].forEach(s=>rankOf[s.name]=s.rank); });

  // Live overlay for the Groups tab: while a match is in progress, fold its current score
  // into that group's table immediately so it visibly updates ball-by-ball. This is kept
  // entirely separate from `results` (which only ever holds confirmed full-time scores) —
  // elimination, `complete[L]`, and rank-locking all stay based on confirmed results only,
  // so a live score can never prematurely decide who's through or who's out.
  const liveResults={...results}; const liveGroupSet=new Set();
  live.forEach(m=>{ if(m.stage!=="group") return; const hit=FIXTURE_INDEX[[m.a,m.b].sort().join("|")]; if(!hit||results[hit.fx.id]) return;
    const fwd=hit.fx.a===m.a; liveResults[hit.fx.id]={hs:fwd?m.ga:m.gb,as:fwd?m.gb:m.ga,src:"live"}; liveGroupSet.add(hit.L); });
  const liveStandings={}; GROUP_LETTERS.forEach(L=>{ liveStandings[L]=liveGroupSet.has(L)?computeStandings(L,liveResults,discipline,null):standings[L]; });
  const liveTeamInfo={}; live.forEach(m=>{
    liveTeamInfo[m.a]={opponent:m.b,my:m.ga,opp:m.gb,clock:m.clock,detail:m.detail,stage:m.stage};
    liveTeamInfo[m.b]={opponent:m.a,my:m.gb,opp:m.ga,clock:m.clock,detail:m.detail,stage:m.stage}; });
  const allComplete=GROUP_LETTERS.every(L=>complete[L]);
  let thirdAdv=new Set();
  if(allComplete){ const th=GROUP_LETTERS.map(L=>standings[L][2]); th.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||((discipline[b.name]||0)-(discipline[a.name]||0))||strength(b.name)-strength(a.name)); th.slice(0,8).forEach(t=>thirdAdv.add(t.name)); }
  const earlyOutByGroup={}; GROUP_LETTERS.forEach(L=>{ earlyOutByGroup[L]=complete[L]?new Set():computeEarlyEliminations(L,results,discipline,official); });

  const koLosers=new Set(); const koStats={}; ALL_TEAMS.forEach(t=>koStats[t]={p:0,w:0,d:0,l:0,gf:0,ga:0});
  const clashes=[];
  const getDate=(a,b)=>rdates[[a,b].sort().join("|")]||null;
  const add=(stage,a,b,ga,gb,pens,date)=>clashes.push({stage,a,b,ga,gb,pens,oa:OWNER_OF[a],ob:OWNER_OF[b],date});
  GROUP_LETTERS.forEach(L=>FIXTURES[L].forEach(fx=>{const r=results[fx.id]; if(r&&r.hs!=null) add("Group "+L,fx.a,fx.b,r.hs,r.as,null,getDate(fx.a,fx.b));}));
  ko.forEach(m=>{ if(m.hs==null||m.as==null) return; const SA=koStats[m.a],SB=koStats[m.b];
    if(SA&&SB){SA.p++;SB.p++;SA.gf+=m.hs;SA.ga+=m.as;SB.gf+=m.as;SB.ga+=m.hs; if(m.hs>m.as){SA.w++;SB.l++;}else if(m.hs<m.as){SB.w++;SA.l++;}else{SA.d++;SB.d++;}}
    const wl=koWL(m); if(wl) koLosers.add(wl.l); add(m.round,m.a,m.b,m.hs,m.as,(m.pa!=null&&m.pb!=null)?[m.pa,m.pb]:null,getDate(m.a,m.b)); });

  const teamOut={};
  ALL_TEAMS.forEach(t=>{ if(koLosers.has(t)){teamOut[t]=true;return;} const L=GROUP_OF[t];
    if(earlyOutByGroup[L].has(t)){teamOut[t]=true;return;}
    if(complete[L]){const r=rankOf[t]; if(r===4){teamOut[t]=true;return;} if(r===3){teamOut[t]=allComplete?!thirdAdv.has(t):false;return;}} teamOut[t]=false; });

  const groupStats={}; GROUP_LETTERS.forEach(L=>standings[L].forEach(s=>groupStats[s.name]=s));
  const owner={}; OWNERS.forEach(o=>owner[o]={owner:o,p:0,w:0,d:0,l:0,gf:0,ga:0,teams:[],teamsLeft:0});
  ALL_TEAMS.forEach(t=>{const o=OWNER_OF[t],g=groupStats[t],k=koStats[t],O=owner[o];
    O.p+=g.p+k.p;O.w+=g.w+k.w;O.d+=g.d+k.d;O.l+=g.l+k.l;O.gf+=g.gf+k.gf;O.ga+=g.ga+k.ga;O.teams.push(t); if(!teamOut[t])O.teamsLeft++;});
  OWNERS.forEach(o=>{const O=owner[o];O.gd=O.gf-O.ga;O.pts=O.w*3+O.d;O.out=O.teamsLeft===0;});

  // champion: derived automatically once the Final has a result
  const finalMatch=ko.find(m=>m.round==="Final"&&m.hs!=null&&m.as!=null);
  const champion = finalMatch ? ((koWL(finalMatch)||{}).w || null) : null;

  // live trophy odds: opening bookmaker price, adjusted for each team's form so far, re-normalised across survivors
  const teamForm=t=>{ const g=groupStats[t]||{}, k=koStats[t]||{};
    const gp=(g.p||0)+(k.p||0); if(!gp) return 1;
    const pts=(g.pts||0)+((k.w||0)*3+(k.d||0));
    const gd=(g.gd||0)+((k.gf||0)-(k.ga||0));
    return Math.max(0.3, Math.min(2.5, 0.5 + (pts/gp)/3 + 0.08*(gd/gp))); };
  const w=t=>(1/((odds[t]??BASE_ODDS[t])??1500))*teamForm(t);
  const inTotal=ALL_TEAMS.filter(t=>!teamOut[t]).reduce((s,t)=>s+w(t),0)||1;
  OWNERS.forEach(o=>{ owner[o].odds=champion?(OWNER_OF[champion]===o?100:0):owner[o].teams.filter(t=>!teamOut[t]).reduce((s,t)=>s+w(t),0)/inTotal*100; });
  const ownerRanked=[...OWNERS].map(o=>owner[o]).sort((a,b)=>(a.out?1:0)-(b.out?1:0)||b.odds-a.odds||b.pts-a.pts||b.gd-a.gd);

  // head-to-head: every clash between two pooled teams; a same-owner meeting attributes BOTH sides to that player
  const h2h={}; OWNERS.forEach(o=>h2h[o]={owner:o,p:0,w:0,d:0,l:0,gf:0,ga:0});
  clashes.forEach(c=>{const A=h2h[c.oa],B=h2h[c.ob]; A.p++;B.p++;A.gf+=c.ga;A.ga+=c.gb;B.gf+=c.gb;B.ga+=c.ga;
    let r; if(c.ga>c.gb)r="a"; else if(c.ga<c.gb)r="b"; else if(c.pens)r=c.pens[0]>c.pens[1]?"a":"b"; else r="d";
    if(r==="a"){A.w++;B.l++;}else if(r==="b"){B.w++;A.l++;}else{A.d++;B.d++;}});
  OWNERS.forEach(o=>{const H=h2h[o];H.gd=H.gf-H.ga;H.pts=H.w*3+H.d;});
  const h2hRanked=[...OWNERS].map(o=>h2h[o]).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||b.w-a.w);
  const h2hPlayed=h2hRanked.some(o=>o.p>0);
  const loser = h2hPlayed ? h2hRanked[h2hRanked.length-1] : null;   // Absolute Loser = bottom of the head-to-head table

  // golden boot: auto + manual scorers, ranked by FIFA's official tiebreaker order
  // (most goals -> most assists -> fewest minutes played). Manual entries don't
  // collect assists/minutes via the admin form, so they default to 0/unknown and
  // simply rank below any auto-synced player they're tied on goals with.
  const scMap=new Map();
  (state.autoScorers||[]).forEach(s=>{if(OWNER_OF[s.t])scMap.set(s.p+"|"+s.t,{p:s.p,t:s.t,g:s.g,a:s.a||0,min:s.min,matches:s.matches||[],src:"auto"});});
  (state.scorers||[]).forEach(s=>{if(OWNER_OF[s.t])scMap.set(s.p+"|"+s.t,{p:s.p,t:s.t,g:s.g,a:s.a||0,min:s.min,matches:s.matches||[],src:"manual"});});
  const scorers=[...scMap.values()].sort((a,b)=>b.g-a.g || (b.a||0)-(a.a||0) || (a.min??9999)-(b.min??9999)).slice(0,15);

  // golden glove: per-goalkeeper clean sheets/saves/minutes, auto + manual, ranked by
  // clean sheets -> saves -> fewest minutes (display ordering only -- the real winner
  // is picked by the FIFA Technical Study Group, as the card's own text already says).
  const gkMap=new Map();
  (state.autoKeepers||[]).forEach(k=>{if(OWNER_OF[k.t])gkMap.set(k.p+"|"+k.t,{p:k.p,t:k.t,cs:k.cs||0,saves:k.saves||0,min:k.min,matches:k.matches||[],src:"auto"});});
  (state.keepers||[]).forEach(k=>{if(OWNER_OF[k.t])gkMap.set(k.p+"|"+k.t,{p:k.p,t:k.t,cs:k.cs||0,saves:k.saves||0,min:k.min,matches:k.matches||[],src:"manual"});});
  const keepers=[...gkMap.values()].sort((a,b)=>b.cs-a.cs || b.saves-a.saves || (a.min??9999)-(b.min??9999)).slice(0,20);

  const bootWinners = tiedWinners(scorers, s=>`${s.g}|${s.a||0}|${s.min??"x"}`, s=>OWNER_OF[s.t]);

  return { standings,complete,allComplete,teamOut,owner,ownerRanked,champion,h2hRanked,loser,h2hPlayed,
    usingOfficial: !!official, upcoming, live, liveStandings, liveTeamInfo,
    clashes:clashes.slice().reverse(), scorers, keepers, bootLeader:scorers[0]||null, gloveLeader:keepers[0]||null,
    bootWinners };
}

function SyncBar({state,syncing,onSync}){
  const last=state.lastSync?timeAgo(state.lastSync):"never";
  const isLive=(state.live||[]).length>0;
  const dot=syncing?C.gold:(state.syncError?C.red:(isLive?C.green:C.green));
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:14,padding:"9px 12px",border:`1px solid ${C.line}`,borderRadius:12,background:"rgba(255,255,255,.02)"}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:dot,boxShadow:(syncing||isLive)?`0 0 8px ${dot}`:"none"}}/>
      <span style={{font:"600 11px Inter",color:C.muted,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
        {syncing?"Syncing latest results…":state.syncError?`Sync failed — ${state.syncError}`:`Updated ${last}${isLive?" · live updates on":""}`}

      <button className="xbtn" style={{marginLeft:"auto",padding:"5px 12px"}} onClick={onSync} disabled={syncing}>Sync now</button>

}

function fmtMatchDate(iso){
  if(!iso) return null;
  try{ return new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date(iso))+" (UK)"; }
  catch(e){ return null; }
}

// Top-of-page summary: whichever pooled-team match is live right now, plus the next
// upcoming one. Same data/logic as the (filterable) boxes inside the H2H tab, just
// always unfiltered -- a quick glance without needing to open a tab.
function LiveAndNextStrip({A}){
  const nowMs=Date.now();
  const liveAll=A.live||[];
  const upAll=(A.upcoming||[]).filter(u=>u.a&&u.b&&OWNER_OF[u.a]&&OWNER_OF[u.b]&&u.koMs>nowMs);
  let nextFx=[];
  if(upAll.length){ const e=upAll[0].koMs; nextFx=upAll.filter(u=>u.koMs-e<60000); }
  if(liveAll.length===0 && nextFx.length===0) return null;
  return (
    <div style={{display:"grid",gap:10,marginTop:14}}>
      {liveAll.length>0 && (
        <div className="card" style={{padding:"10px 12px",borderColor:"rgba(63,215,139,.35)"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:C.green,boxShadow:`0 0 6px ${C.green}`}}/>
            <span style={{font:"700 9px Inter",letterSpacing:"1px",color:C.green,textTransform:"uppercase"}}>Live now</span>
          </div>
          {liveAll.map((m,i)=>(
            <div key={i}>
              {i>0&&<div style={{height:1,background:C.line,margin:"6px 0"}}/>}
              <div style={{font:"600 9px Inter",color:C.muted,marginBottom:3}}>{m.stage}{m.detail?` · ${m.detail}`:m.clock?` · ${m.clock}`:""}</div>
              <ClashSide team={m.a} owner={OWNER_OF[m.a]} score={m.ga} pen={null} lose={false}/>
              <ClashSide team={m.b} owner={OWNER_OF[m.b]} score={m.gb} pen={null} lose={false}/>
            </div>
          ))}
        </div>
      )}
      {nextFx.length>0 && (
        <div className="card" style={{padding:"10px 12px"}}>
          <div style={{font:"700 9px Inter",letterSpacing:"1px",color:C.gold,textTransform:"uppercase",marginBottom:6}}>
            {`Next match${nextFx.length>1?"es":""}`}
            {nextFx[0].ko&&<span style={{fontWeight:500,color:C.muted,marginLeft:8,textTransform:"none"}}>{fmtMatchDate(nextFx[0].ko)}</span>}
          </div>
          {nextFx.map((u,i)=>(
            <div key={i}>
              {i>0&&<div style={{height:1,background:C.line,margin:"4px 0"}}/>}
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0"}}>
                <span style={{font:"600 12px Inter",color:C.text,flex:1,textAlign:"right"}}>{u.a}</span>
                <span className="owntag" style={{color:OWNER_COLOR[OWNER_OF[u.a]]}}>{OWNER_OF[u.a]}</span>
                <span style={{font:"800 11px Inter",color:C.muted,padding:"0 6px"}}>vs</span>
                <span className="owntag" style={{color:OWNER_COLOR[OWNER_OF[u.b]]}}>{OWNER_OF[u.b]}</span>
                <span style={{font:"600 12px Inter",color:C.text,flex:1}}>{u.b}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Clash sort: by real date (desc) if available, else by stage-order proxy
const STAGE_ORDER = {"Final":100,"Third place":90,"Semi-final":80,"Quarter-final":70,"Round of 16":60,"Round of 32":50};
function clashOrder(c){
  if(c.date) return Date.parse(c.date);
  if(STAGE_ORDER[c.stage]) return STAGE_ORDER[c.stage]*1e11;
  const m=c.stage.match(/Group ([A-L])/); if(!m) return 0;
  return GROUP_LETTERS.indexOf(m[1])*3e10+1e10;
}

function HeadToHead({A}){
  const [filterOwner,setFilterOwner]=useState("");
  const [filterTeam,setFilterTeam]=useState("");

  const sorted=[...A.clashes].sort((a,b)=>clashOrder(b)-clashOrder(a));
  const visible=sorted.filter(c=>{
    if(filterOwner && c.oa!==filterOwner && c.ob!==filterOwner) return false;
    if(filterTeam && c.a!==filterTeam && c.b!==filterTeam) return false;
    return true;
  });
  const nowMs=Date.now();
  const upFilt=(A.upcoming||[]).filter(u=>{
    if(!u.a||!u.b||!OWNER_OF[u.a]||!OWNER_OF[u.b]) return false;
    if(filterOwner) return OWNER_OF[u.a]===filterOwner||OWNER_OF[u.b]===filterOwner;
    if(filterTeam) return u.a===filterTeam||u.b===filterTeam;
    return true;
  }).filter(u=>u.koMs>nowMs);
  let nextFx=[];
  if(upFilt.length){ const e=upFilt[0].koMs; nextFx=upFilt.filter(u=>u.koMs-e<60000); }

  const liveFilt=(A.live||[]).filter(m=>{
    if(filterOwner) return OWNER_OF[m.a]===filterOwner||OWNER_OF[m.b]===filterOwner;
    if(filterTeam) return m.a===filterTeam||m.b===filterTeam;
    return true;
  });

  return (
    <div style={{paddingTop:14}}>
      <p style={{font:"500 12px/1.5 Inter",color:C.muted,margin:"0 2px 12px"}}>Every match where two of the pooled teams meet. Cross-player clashes go on each player's record; when a player's own two teams meet, both results count for them. A knockout settled on penalties counts as a draw.</p>
      <div style={{overflowX:"auto",border:`1px solid ${C.line}`,borderRadius:14,marginBottom:16}}>
        <table className="lt"><thead><tr><th style={{textAlign:"left",paddingLeft:14}}>Player</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th className="sorted">Pts</th></tr></thead>
          <tbody>{A.h2hRanked.map(O=>(
            <tr key={O.owner}><td style={{textAlign:"left",paddingLeft:14}}><span style={{display:"inline-flex",alignItems:"center",gap:8}}><Crest owner={O.owner} size={22}/><b style={{color:C.text}}>{O.owner}</b></span></td>
              <td>{O.p}</td><td>{O.w}</td><td>{O.d}</td><td>{O.l}</td><td>{O.gf}</td><td>{O.ga}</td><td>{O.gd>=0?"+":""}{O.gd}</td><td className="sorted"><b style={{color:C.text}}>{O.pts}</b></td></tr>))}</tbody>
        </table>
      </div>

      <div className="display" style={{fontSize:15,color:C.gold,margin:"4px 2px 10px"}}>The clashes</div>

      {/* Filters */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div>
          <label className="lbl">Filter by player</label>
          <select className="inp" value={filterOwner} onChange={e=>{setFilterOwner(e.target.value);setFilterTeam("");}}>
            <option value="">All players</option>
            {[...OWNERS].sort().map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label className="lbl">Filter by team</label>
          <select className="inp" value={filterTeam} onChange={e=>{setFilterTeam(e.target.value);setFilterOwner("");}}>
            <option value="">All teams</option>
            {GROUP_LETTERS.map(L=><optgroup key={L} label={`Group ${L}`}>{GROUPS[L].map(t=><option key={t} value={t}>{t}</option>)}</optgroup>)}
          </select>
        </div>
      </div>
      {liveFilt.length>0 && (
        <div className="card" style={{padding:"10px 12px",marginBottom:12,borderColor:"rgba(63,215,139,.35)"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:C.green,boxShadow:`0 0 6px ${C.green}`}}/>
            <span style={{font:"700 9px Inter",letterSpacing:"1px",color:C.green,textTransform:"uppercase"}}>Live now{filterOwner?` · ${filterOwner}`:filterTeam?` · ${filterTeam}`:""}</span>
          </div>
          {liveFilt.map((m,i)=>(
            <div key={i}>
              {i>0&&<div style={{height:1,background:C.line,margin:"6px 0"}}/>}
              <div style={{font:"600 9px Inter",color:C.muted,marginBottom:3}}>{m.stage}{m.detail?` · ${m.detail}`:m.clock?` · ${m.clock}`:""}</div>
              <ClashSide team={m.a} owner={OWNER_OF[m.a]} score={m.ga} pen={null} lose={false}/>
              <ClashSide team={m.b} owner={OWNER_OF[m.b]} score={m.gb} pen={null} lose={false}/>
            </div>
          ))}
        </div>
      )}
      {nextFx.length>0 && (
        <div className="card" style={{padding:"10px 12px",marginBottom:12,borderColor:"rgba(244,201,93,.3)"}}>
          <div style={{font:"700 9px Inter",letterSpacing:"1px",color:C.gold,textTransform:"uppercase",marginBottom:6}}>
            {`Next match${nextFx.length>1?"es":""}${filterOwner?` · ${filterOwner}`:filterTeam?` · ${filterTeam}`:""}`}
            {nextFx[0].ko&&<span style={{fontWeight:500,color:C.muted,marginLeft:8,textTransform:"none"}}>{fmtMatchDate(nextFx[0].ko)}</span>}
          </div>
          {nextFx.map((u,i)=>(
            <div key={i}>
              {i>0&&<div style={{height:1,background:C.line,margin:"4px 0"}}/>}
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0"}}>
                <span style={{font:"600 12px Inter",color:C.text,flex:1,textAlign:"right"}}>{u.a}</span>
                <span className="owntag" style={{color:OWNER_COLOR[OWNER_OF[u.a]]}}>{OWNER_OF[u.a]}</span>
                <span style={{font:"800 11px Inter",color:C.muted,padding:"0 6px"}}>vs</span>
                <span className="owntag" style={{color:OWNER_COLOR[OWNER_OF[u.b]]}}>{OWNER_OF[u.b]}</span>
                <span style={{font:"600 12px Inter",color:C.text,flex:1}}>{u.b}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {(filterOwner||filterTeam)&&nextFx.length===0&&<div style={{font:"600 11px Inter",color:C.muted,marginBottom:10}}>No upcoming fixtures for this selection.</div>}
      {(filterOwner||filterTeam)&&<div style={{font:"600 11px Inter",color:C.muted,marginBottom:10}}>Showing {visible.length} of {sorted.length} clashes</div>}

      {A.clashes.length===0 && <div className="card" style={{padding:18,textAlign:"center",color:C.muted,font:"500 13px Inter"}}>No two pooled teams have met yet.</div>}
      {A.clashes.length>0 && visible.length===0 && <div className="card" style={{padding:18,textAlign:"center",color:C.muted,font:"500 13px Inter"}}>No clashes match this filter.</div>}
      <div style={{display:"grid",gap:8}}>{visible.map((c,i)=>{
        const same=c.oa===c.ob;

function KnockoutsView({state,A}){

function KoCard({m,live}){ const wl=koWL(m);
  // While the match is live, show the in-progress score instead of m.hs/m.as (which stay
  // null until full-time anyway) — oriented to whichever side of `live` matches team a/b.
  const liveFwd=live&&live.a===m.a;
  const lhs=live?(liveFwd?live.ga:live.gb):null, las=live?(liveFwd?live.gb:live.ga):null;
  const hs=live?lhs:m.hs, as=live?las:m.as;
  const row=(team,score,pen)=>(<div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",opacity:wl&&wl.l===team?.5:1}}>
    <FlagDot team={team}/><span style={{color:C.text,font:"600 14px Inter"}}>{team}</span><span className="owntag" style={{color:OWNER_COLOR[OWNER_OF[team]]}}>{OWNER_OF[team]}</span>
    {wl&&wl.w===team&&<span style={{marginLeft:"auto",font:"700 11px Inter",color:C.green}}>WON</span>}
    <span className="display" style={{marginLeft:wl&&wl.w===team?8:"auto",fontSize:20,color:C.text}}>{score==null?"–":score}{pen!=null?<sup style={{fontSize:11,color:C.gold}}> ({pen})</sup>:null}</span></div>);
  return <div className="card" style={{padding:"4px 14px"}}>
    {live && <div style={{display:"flex",alignItems:"center",gap:5,padding:"6px 0 0",font:"800 9px Inter",letterSpacing:"1px",textTransform:"uppercase",color:C.red}}><i className="live-dot"/>Live</div>}
    {row(m.a,hs,m.pa)}<div style={{height:1,background:C.line}}/>{row(m.b,as,m.pb)}</div>;
}

function Prize({value,forfeit,splitCount}){
  const showSplit = !!(splitCount && splitCount>1);
  const m = showSplit ? value.match(/^£(\d+(?:\.\d+)?)$/) : null;

  return (<div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${C.line}`,flexWrap:"wrap"}}>

// Shows exactly how a player's total minutes were built up: one row per match with
// role (started/sub), the clock window counted, and any red card cap -- tap a MIN
// value above to open this. Pulls straight from the same data the totals are computed
// from, so it can never drift out of sync with what's actually being summed.
function MinutesAudit({matches,total}){
  const list=matches||[];
  const sumRegular=list.reduce((s,m)=>s+(m.regular||0),0);
  const sumStoppage=list.reduce((s,m)=>s+(m.stoppage||0),0);
  return (
    <div style={{margin:"0 0 8px 27px",padding:"8px 10px",background:"#0E1626",borderRadius:10,border:`1px solid ${C.line}`}}>
      <div style={{font:"700 10px Inter",letterSpacing:".5px",textTransform:"uppercase",color:C.muted,marginBottom:6}}>Minutes audit — how {total}' was reached</div>
      <div style={{display:"grid",gap:5}}>{list.map((m,i)=>(
        <div key={i} style={{font:"500 11px Inter",color:C.text,lineHeight:1.4}}>
          <span style={{color:C.gold,fontWeight:700}}>vs {m.opponent}: {m.min}'</span>
          <span style={{color:C.muted}}> ({m.regular}' regular + {m.stoppage}' stoppage)</span>
          <span style={{color:C.muted}}> — {m.role}, on pitch {m.start}'→{m.end}' (match length {m.matchLen}')</span>
          {m.subEvent!=null && <span style={{color:C.muted}}> · subbed {m.role==="Started"?"off":"on"} at {m.subEvent}'</span>}
          {m.redCard!=null && <span style={{color:C.red}}> · red card {m.redCard}'</span>}
          {m.halfOneAdded>0 && <span style={{color:C.muted}}> · +{m.halfOneAdded}' 1st-half stoppage</span>}
          {m.halfTwoAdded>0 && <span style={{color:C.muted}}> · +{m.halfTwoAdded}' 2nd-half stoppage</span>}
        </div>
      ))}</div>
      <div style={{font:"600 11px Inter",color:C.muted,marginTop:6,paddingTop:6,borderTop:`1px solid ${C.line}`}}>
        Sum: {list.map(m=>`${m.min}'`).join(" + ")||"0'"} = <b style={{color:C.gold}}>{total}'</b>
        <div style={{marginTop:3}}>Regular time: <b style={{color:C.text}}>{sumRegular}'</b> · Stoppage time: <b style={{color:C.text}}>{sumStoppage}'</b></div>
      </div>
    </div>
  );
}

function Crest({owner,size=28}){ return <span style={{width:size,height:size,borderRadius:"50%",flex:`0 0 ${size}px`,background:OWNER_COLOR[owner],display:"inline-flex",alignItems:"center",justifyContent:"center",font:`800 ${Math.round(size*.42)}px Inter`,color:"#0A0F1E"}}>{owner[0]}</span>; }
function FlagDot({team}){ return <span style={{width:8,height:8,borderRadius:"50%",flex:"0 0 8px",background:OWNER_COLOR[OWNER_OF[team]]||C.muted}}/>; }
function Stat({big,unit,label}){ return (<div className="card statcard" style={{flex:"1 1 120px"}}>
  <div style={{display:"flex",alignItems:"baseline",gap:5}}><span className="display" style={{fontSize:30,color:C.text,lineHeight:1}}>{big}</span><span style={{font:"700 11px Inter",color:C.gold}}>{unit}</span></div>
  <div style={{font:"600 10px/1.3 Inter",letterSpacing:".5px",color:C.muted,textTransform:"uppercase",marginTop:6}}>{label}</div></div>); }
function Shell({children}){ return <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Inter,system-ui,sans-serif"}}><div style={{maxWidth:560,margin:"0 auto"}}>{children}</div></div>; }
function timeAgo(iso){ const s=(Date.now()-Date.parse(iso))/1000; if(s<60)return "just now"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }

const C={ bg:"#0A0F1E", panel:"#131B30", line:"rgba(255,255,255,.09)", text:"#EAF0FB", muted:"#8693AE", gold:"#F4C95D", goldDeep:"#D99B33", green:"#3FD78B", red:"#FB6B5B" };
function Style(){ return <style>{`
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');
  *{box-sizing:border-box}
  .display{font-family:'Barlow Condensed',Inter,sans-serif;font-weight:800;text-transform:uppercase}
  .card{background:${C.panel};border:1px solid ${C.line};border-radius:16px}
  .statcard{padding:12px 14px}
  .tabs{display:flex;gap:5px;padding:14px 14px 6px}
  .tab{flex:1 1 0;min-width:0;background:transparent;border:1px solid ${C.line};color:${C.muted};font:700 11px Inter;padding:9px 4px;border-radius:10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;transition:.15s}
  .tab:hover{color:${C.text}} .tab.active{background:${C.gold};border-color:${C.gold};color:#0A0F1E}
  .lockbtn{background:transparent;border:1px solid ${C.line};color:${C.gold};font:700 12px Inter;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .lockbtn:hover{border-color:${C.gold}}
  .pill{font:800 9px Inter;letter-spacing:.5px;padding:2px 7px;border-radius:6px}
  .pill.in{background:rgba(63,215,139,.15);color:${C.green}} .pill.out{background:rgba(251,107,91,.15);color:${C.red}}
  .chip{display:inline-flex;align-items:center;gap:5px;font:600 11px Inter;color:${C.text};background:rgba(255,255,255,.05);border:1px solid ${C.line};padding:3px 8px;border-radius:999px}
  .chip.out{color:${C.muted};text-decoration:line-through;opacity:.6}
  .owntag{font:700 9px Inter;letter-spacing:.5px;text-transform:uppercase}
  table.lt,table.grp{width:100%;border-collapse:collapse;font:600 12px Inter;color:${C.muted}}
  table.lt th,table.grp th{font:700 10px Inter;letter-spacing:.5px;text-transform:uppercase;color:${C.muted};padding:10px 5px;text-align:center;white-space:nowrap;border-bottom:1px solid ${C.line};user-select:none}
  table.lt td,table.grp td{padding:9px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
  table.lt tr:last-child td,table.grp tr:last-child td{border-bottom:none}
  th.sorted,td.sorted{color:${C.gold}}
  .rankdot{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font:800 10px Inter;color:#0A0F1E;vertical-align:middle}
  i.rankdot{width:11px;height:11px;margin-right:4px}
  .inp{width:100%;background:#0E1626;border:1px solid ${C.line};color:${C.text};font:600 13px Inter;padding:9px 10px;border-radius:10px;outline:none}
  .inp:focus{border-color:${C.gold}}
  .lbl{display:block;font:700 9px Inter;letter-spacing:.5px;text-transform:uppercase;color:${C.muted};margin-bottom:4px}
  .score{width:38px;text-align:center;background:#0E1626;border:1px solid ${C.line};color:${C.text};font:700 14px Inter;padding:6px 2px;border-radius:8px;outline:none}
  .score:focus{border-color:${C.gold}}
  .btn{background:${C.gold};color:#0A0F1E;border:none;font:800 13px Inter;padding:10px 16px;border-radius:10px;cursor:pointer}
  .btn:hover{background:#ffd76b} .btn:disabled{opacity:.5;cursor:default}
  .xbtn{background:transparent;border:1px solid ${C.line};color:${C.muted};font:700 12px Inter;padding:6px 10px;border-radius:8px;cursor:pointer}
  .xbtn:hover{color:${C.red};border-color:${C.red}} .xbtn:disabled{opacity:.5}
  .overlay{position:fixed;inset:0;background:rgba(5,8,16,.7);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(3px)}
  .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:${C.red};box-shadow:0 0 0 0 rgba(251,107,91,.55);animation:livepulse 1.4s infinite}
  @keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(251,107,91,.55)}70%{box-shadow:0 0 0 6px rgba(251,107,91,0)}100%{box-shadow:0 0 0 0 rgba(251,107,91,0)}}
  input[type=number]::-webkit-inner-spin-button{opacity:.3}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}.live-dot{animation:none}}
`}</style>; }


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
